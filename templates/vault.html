{% extends "base.html" %}
{% block content %}

<h2 style="text-align:center;">🔒 CLASSIFIED VAULT</h2>
<p style="text-align:center; color: #ff4d4d;">Authorized Access Only</p>

<div class="notes-grid">
    {% for note in notes %}
    <div class="note-card">
        <h3>{{ note['title'] }}</h3>
        <p>{{ note['description'] }}</p>
    </div>
    {% endfor %}
</div>

<a href="{{ url_for('index') }}" class="btn btn-secondary">Back</a>

{% endblock %}
