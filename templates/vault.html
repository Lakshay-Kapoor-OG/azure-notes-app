{% extends "base.html" %}
{% block content %}

<h2>🔒 Secret Notes</h2>

<div class="notes-grid">
    {% if notes %}
        {% for note in notes %}
        <div class="note-card">
            <h3>{{ note['title'] }}</h3>
            <p>{{ note['description'] }}</p>
        </div>
        {% endfor %}
    {% else %}
        <p>No secret notes found.</p>
    {% endif %}
</div>

<a href="{{ url_for('index') }}" class="btn btn-secondary">Back</a>

{% endblock %}
