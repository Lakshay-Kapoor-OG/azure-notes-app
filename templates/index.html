{% extends "base.html" %}
{% block content %}

<div class="actions">
    <a href="{{ url_for('add_note') }}" class="btn btn-primary">➕ Add Note</a>
    <a href="{{ url_for('vault') }}" class="btn btn-secondary">🔒 Vault</a>
</div>

<div class="notes-grid">
    {% for note in notes %}
    <div class="note-card">
        <h3>{{ note[1] }}</h3>
        <p>{{ note[2] }}</p>
        <a href="{{ url_for('delete_note', note_id=note[0]) }}" class="btn btn-danger">Delete</a>
    </div>
    {% endfor %}
</div>

{% endblock %}
